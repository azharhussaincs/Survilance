# CMS Application Configuration
app.name=CMS - Camera Management System
app.version=1.0.0
app.company=CMS Security Solutions

# Database Configuration
db.url=jdbc:mysql://localhost:3306/cms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.username=root
db.password=admin
db.pool.size=10
db.pool.min.idle=2
db.pool.connection.timeout=30000
db.pool.idle.timeout=600000
db.pool.max.lifetime=1800000

# Stream Configuration
stream.connection.timeout=10000
stream.read.timeout=30000
stream.reconnect.attempts=3
stream.reconnect.delay=5000

# ONVIF Configuration
onvif.discovery.timeout=5000
onvif.port=80

# NVR Connection Configuration
nvr.connect.timeout=15000
nvr.auth.timeout=10000

# UI Configuration
ui.theme=dark
ui.default.grid.rows=2
ui.default.grid.cols=2
